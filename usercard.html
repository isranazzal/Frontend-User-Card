<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card Example</title>
    <link rel="stylesheet" href="UserCard.css".css>
</head>
<body>
    <div class="usercard">
        <div class="header"></div>
        <div class="content">
            <div class="pic">
                <img src="icons/user-circle.png" alt="user photo">
            </div>
            <div>
                <h2>Jane Doe</h2>
            </div>
            <div class="location">
                <img src="icons/map-marker.png" alt="map photo">
                <h4>Seattle</h4>
            </div>
            <div class="paragraph">
                <p>Developer | Engineer | Problem Solver <br>
                    Master of shadows and the Internet!
                </p>
            </div>
            <div class="edit">
                <img src="icons/gear.png" alt="gear photo for editing">
                <a href="#">edit profile</a>
            </div>
        </div>
    </div>
</body>
</html>
